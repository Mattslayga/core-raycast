name: Bug report
description: Report a reproducible issue with the Core Edge Raycast extension.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Core Edge for Raycast. Do not include API tokens, private Core content, raw server responses with private data, or screenshots of Raycast preferences.
  - type: dropdown
    id: command
    attributes:
      label: Command
      description: Which command were you using?
      options:
        - Search Core
        - Explore Core
        - Quick Capture
        - Link Records
        - What Next
        - Open Loops
        - Agenda
        - Recent
        - Project Context
        - Browse Records
        - Other
    validations:
      required: true
  - type: dropdown
    id: token-role
    attributes:
      label: Token role
      description: Do not paste the token. Only select the role.
      options:
        - read
        - write
        - unknown
    validations:
      required: true
  - type: input
    id: server-version
    attributes:
      label: Core Edge server version
      description: Provide the version if you know it.
      placeholder: "unknown"
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Use sanitized data only.
      placeholder: |
        1. Run `Search Core`
        2. Search for ...
        3. Select ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized error text
      description: Paste only sanitized errors. Remove tokens, private record content, record IDs if sensitive, and server responses with private data.
      render: text
