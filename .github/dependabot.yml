version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      raycast-tooling:
        patterns:
          - "@raycast/*"
      test-and-typescript:
        patterns:
          - "typescript"
          - "vitest"
          - "@types/*"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
